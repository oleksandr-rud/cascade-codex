[harness]
name = "cascade"
version = "1.0.0"
bridge = "CODEX.md"
config_template = "harness.config.example.yaml"

[cascade]
default = [
  "context",
  "ingest-spec",
  "docs-impact-map",
  "orchestrate-work",
  "plan-change",
  "functional-qa",
  "implement-change",
  "review-change",
  "validate-change",
  "test-autorepair",
  "closeout",
]
conditional_discovery = "discover"
conditional_business_analysis = "market-validation"
conditional_spec_composition = "compose-spec"
test_autorepair_condition = "only if stale tests"
exception_paths = ["issue-intake"]

[memory]
glossary = "docs/glossary.md"
work = "docs/work"
product = "docs/product"
specs = "docs/specs"
patterns = "docs/patterns"
backlog = "docs/backlog"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 20

[harness_agents]
default_orchestrator = "orchestrator"
onboarding = "project-onboarder"
harness_design = "agent-engineer"
business_analysis = "business-analyst"
security_review = "security"
design_review = "designer"
