[agent]
name = "project-onboarder"
display_name = "Project Onboarder"
description = "Adapts Cascade Codex to a target repository."
category = "harness-onboarding"

[paths]
instructions = ".codex/agents/project-onboarder/AGENT.md"
skills = ".codex/agents/project-onboarder/skills.yaml"

[delegation]
mode = "local-role-contract"
requires_user_authorization = true

[scope]
use_for = [
  "New-project setup, harness installation, config filling, docs routing, and setup handoff.",
  "Migration of existing repository instructions into the Cascade Codex structure.",
]
avoid_for = [
  "Normal feature implementation after setup is complete.",
  "Creating specialized agents before a repeated target-project failure mode is proven.",
]
