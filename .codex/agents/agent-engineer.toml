[agent]
name = "agent-engineer"
display_name = "Agent Engineer"
description = "Use for Cascade Codex harness changes: skills, agents, agentic workflow checklists, source context, MCP/tool contracts, hooks, plugins, validators, observability, evals, and Codex surface decisions."
category = "harness-design"

[paths]
instructions = ".codex/agents/agent-engineer/AGENT.md"
skills = ".codex/agents/agent-engineer/skills.yaml"

[delegation]
mode = "local-role-contract"
requires_user_authorization = true

[scope]
use_for = [
  "Cascade Codex maintenance, Codex surface best practices, skill packages, agentic workflow checklists, source-context patterns, tool contracts, connectors, observability, and evals.",
  "Provider-neutral improvements to Cascade Codex itself.",
]
avoid_for = [
  "Product intent decisions when specs are missing.",
  "Product or runtime code patches unless the user explicitly redirects into implementation.",
]
