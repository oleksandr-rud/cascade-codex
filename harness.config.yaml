# Cascade adapter variables.
# Copy to harness.config.yaml after installing the harness in a target project.

project:
  name: "Dynamic Persona Assistant"
  kind: "agentic assistant project scaffold"
  primary_users:
    - "Project maintainers"
    - "Coding agents working in this repository"
  stack:
    backend:
      language: "Python for harness validation only"
      framework: "none yet"
      package_manager: "none yet"
      runtime:
        - "Python 3.14+"
    frontend:
      language: "none yet"
      framework: "none yet"
      build_tool: "none yet"
      package_manager: "none yet"
    data:
      database: "none yet"
      cache: "none yet"
      storage: "none yet"
    integrations:
      - "Codex runtime"
      - "GitHub repository"
    test:
      unit: "none yet"
      functional: "Cascade validator"
      e2e: "none yet"

paths:
  source_roots:
    - ".codex"
    - "docs"
    - "scripts"
  test_roots:
    - "scripts"
  app_entrypoints:
    - "AGENTS.md"
    - "CODEX.md"
  public_contracts:
    - "harness.config.yaml"
    - ".codex/config.toml"
    - "scripts/validate_cascade_codex.py"
  docs_root: "docs"
  structure: "docs/structure.md"
  glossary: "docs/glossary.md"
  backlog: "docs/backlog/_index.md"
  product_index: "docs/product/_index.md"
  product_scenarios: "docs/product/scenarios.md"
  personas_index: "docs/product/personas/_index.md"
  design_index: "docs/design/_index.md"
  brand_index: "docs/brand/_index.md"
  specs_index: "docs/specs/_index.md"
  specs_source: "docs/specs/source"
  specs_slice_pattern: "docs/specs/{slice-slug}"
  work_index: "docs/work/_index.md"
  active_work: "docs/work/active.md"
  work_lane_template: "docs/work/lane-template.md"
  work_lane_examples: "docs/work/examples"
  work_lanes: "docs/work/lanes"
  work_reports: "docs/work/reports"
  patterns: "docs/patterns"

validation_commands:
  install: []
  targeted:
    - "python scripts/validate_cascade_codex.py"
  unit: []
  lint: []
  typecheck: []
  build: []
  functional:
    - "python scripts/validate_cascade_codex.py"
  e2e: []

routing:
  new_task_path:
    - "context"
    - "ingest-spec, discover, market-validation, synthesis-to-spec, or compose-spec when source material, missing intent, long business-analysis research, evidence synthesis, or product/spec authoring exists"
    - "docs-impact-map when durable docs may affect sibling rules"
    - "orchestrate-work"
    - "plan-change"
    - "functional-qa"
    - "implement-change"
    - "review-change"
    - "validate-change"
    - "test-autorepair only if automated tests are stale"
    - "closeout"
  issue_intake: "explicit issue-body or tracker-ticket exception path"
  human_review: "explicit open-question or exception path only"
  stale_test_policy: "test-autorepair preserves semantic coverage; product bugs route to implement-change"
  business_analysis: "business-analyst uses market-validation lanes, synthesis-to-spec for evidence synthesis, and compose-spec for PRDs/personas/spec artifacts"
  security_review: "security uses codebase-audit, auth-analysis, and secure-design for security-sensitive review before implementation"
  design_review: "designer uses ux-flow-review, accessibility-review, visual-qa, and design-system for design-sensitive review before implementation"

vocabulary:
  prefer_codebase_terms: true
  term_sources:
    - "docs/glossary.md"
    - "README.md"
  forbidden_generic_framing:
    - "generic domain layer"
    - "abstract business object"

functional_acceptance:
  primary_gate: true
  browser_or_e2e_runner: "none yet"
  api_check_runner: "none yet"
  visual_check_runner: "none yet"
  source_blind_product_checks: true
  scenario_sources:
    - "docs/product/scenarios.md"
    - "docs/work/active.md"
    - "docs/work/lanes"
    - "docs/work/examples"

memory:
  active_work: "docs/work/active.md"
  research_memory: "docs/patterns/context-memory.md"
  lane_packets: "docs/work/lanes"
  lane_examples: "docs/work/examples"
  work_reports: "docs/work/reports"
  product_facts:
    - "docs/product"
    - "docs/design"
    - "docs/brand"
    - "docs/specs"
  durable_lessons:
    - ".codex/skills"
    - ".codex/agents"
    - "docs/patterns"
  write_reports_when:
    - "requested"
    - "work_spans_turns"
    - "durable_decision"
    - "blocked_handoff"

issue_tracker:
  provider: "none"
  project_key: ""
  default_project_or_team: ""
  file_when_requested_only: true

patterns:
  workflow: "docs/patterns/workflow.md"
  boundaries: "docs/patterns/boundaries.md"
  testing: "docs/patterns/testing.md"
  context_memory: "docs/patterns/context-memory.md"
